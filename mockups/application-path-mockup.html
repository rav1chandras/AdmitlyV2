<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Application Path Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #06245B;
      --blue: #14A6D8;
      --yellow: #FFE500;
      --line: #18A9DA;
      --circle: #eef1f5;
      --circle-border: #d9e0ea;
      --text: #172033;
      --muted: #8C8C8C;
      --card: #ffffff;
      --bg: #f7f7f5;
      --border: #e7e5e4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(980px, calc(100vw - 48px));
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 34px 40px 38px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }

    .title {
      margin: 0 0 28px;
      color: var(--navy);
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.2px;
    }

    .path {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 226px;
      align-items: center;
      gap: 34px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      position: relative;
      min-height: 132px;
      align-items: start;
    }

    .steps::before {
      content: "";
      position: absolute;
      top: 36px;
      left: 16.666%;
      right: 16.666%;
      height: 5px;
      background: linear-gradient(90deg, #d8dee8, #e7ebf1);
      border-radius: 999px;
      transform: translateY(-50%);
      z-index: 0;
    }

    .step {
      position: relative;
      z-index: 1;
      text-align: center;
      min-width: 0;
    }

    .circle {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 999px;
      background: #fff;
      border: 4px solid var(--circle-border);
      display: grid;
      place-items: center;
      color: var(--navy);
      box-shadow: 0 7px 18px rgba(15, 23, 42, 0.08);
    }

    .step:first-child .circle {
      background: var(--yellow);
      border-color: var(--yellow);
      box-shadow: 0 10px 24px rgba(255, 229, 0, 0.34);
    }

    .step:not(:first-child) .circle {
      background: var(--circle);
      color: #6b7280;
    }

    .circle svg {
      width: 31px;
      height: 31px;
      stroke: currentColor;
      stroke-width: 2.3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .label {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 6px;
    }

    .note {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
    }

    .expert {
      min-height: 148px;
      border-radius: 24px;
      background: var(--navy);
      color: var(--yellow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      box-shadow: 0 18px 34px rgba(6, 36, 91, 0.22);
    }

    .expert-icon {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--navy);
      display: grid;
      place-items: center;
      margin-bottom: 16px;
    }

    .expert-icon svg {
      width: 23px;
      height: 23px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .expert-title {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .expert-note {
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .path {
        grid-template-columns: 1fr;
      }

      .expert {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <section class="wrap" aria-label="Application path mockup">
    <h1 class="title">Application path</h1>
    <div class="path">
      <div class="steps">
        <div class="step">
          <div class="circle" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 7.5 12 3l8 4.5-8 4.5L4 7.5Z"/>
              <path d="M4 7.5V16l8 4.5 8-4.5V7.5"/>
              <path d="M12 12v8.5"/>
            </svg>
          </div>
          <div class="label">Build profile</div>
          <div class="note">70% complete</div>
        </div>

        <div class="step">
          <div class="circle" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 20V7l7-4 7 4v13"/>
              <path d="M8 20v-6h8v6"/>
              <path d="M10 8h4"/>
              <path d="M10 11h4"/>
            </svg>
          </div>
          <div class="label">Select colleges</div>
          <div class="note">Build list</div>
        </div>

        <div class="step">
          <div class="circle" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 4h10l1 16H6L7 4Z"/>
              <path d="M9 8h6"/>
              <path d="M9 12h4"/>
              <circle cx="17" cy="17" r="4"/>
              <path d="m15.6 17 1 1 2-2"/>
            </svg>
          </div>
          <div class="label">Improve essays</div>
          <div class="note">0% progress</div>
        </div>
      </div>

      <button class="expert" type="button">
        <span class="expert-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 4 4 8l8 4 8-4-8-4Z"/>
            <path d="M7 10.5v4.2c0 1.8 2.2 3.3 5 3.3s5-1.5 5-3.3v-4.2"/>
            <path d="M20 8v5"/>
          </svg>
        </span>
        <span class="expert-title">Expert session</span>
        <span class="expert-note">Book advisor</span>
      </button>
    </div>
  </section>
</body>
</html>
