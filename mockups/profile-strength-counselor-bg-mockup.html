<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Strength Counselor Background Mockup</title>
  <style>
    :root { --navy: #06245B; --green: #0F8B63; --muted: #667fa3; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      background: #f5f7fb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
    }
    .card {
      width: min(1120px, 100%);
      min-height: 330px;
      border: 1px solid #f0c4d6;
      border-radius: 24px;
      padding: 34px 38px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,.92) 0%, rgba(255,255,255,.84) 48%, rgba(255,255,255,.34) 100%),
        url("../public/profile-strength-counselor-bg.svg") center / cover no-repeat;
      box-shadow: 0 16px 40px rgba(92, 28, 65, .08);
    }
    .content { position: relative; z-index: 1; }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 46px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(6,36,91,.1);
      background: rgba(255,255,255,.74);
      color: var(--navy);
      font-size: 14px;
      font-weight: 900;
      backdrop-filter: blur(6px);
    }
    .edit {
      height: 52px;
      border: 0;
      border-radius: 16px;
      background: var(--navy);
      color: #fff;
      padding: 0 22px;
      font: inherit;
      font-size: 15px;
      font-weight: 950;
      box-shadow: 0 12px 28px rgba(6,36,91,.16);
    }
    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 32px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 4vw, 52px);
      line-height: 1.03;
      letter-spacing: -0.025em;
    }
    p {
      margin: 12px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 650;
    }
    .track {
      height: 12px;
      border-radius: 999px;
      background: rgba(6,36,91,.08);
      overflow: hidden;
      margin-top: 26px;
      max-width: 680px;
    }
    .fill {
      width: 96%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #cc266d, var(--navy) 52%, #0bb08a);
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .pill {
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 15px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(6,36,91,.1);
      color: var(--navy);
      font-weight: 900;
      backdrop-filter: blur(6px);
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #0bb08a; }
    .dot.blue { background: var(--navy); }
    .dot.pink { background: #cc266d; }
    .score { text-align: right; padding-bottom: 4px; }
    .num {
      font-size: 82px;
      line-height: .86;
      font-weight: 950;
      letter-spacing: -.06em;
    }
    .num span {
      color: rgba(6,36,91,.28);
      font-size: 26px;
      letter-spacing: 0;
    }
    .rank {
      display: inline-flex;
      align-items: center;
      height: 38px;
      margin-top: 18px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(15,139,99,.12);
      color: var(--green);
      font-weight: 950;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="content">
      <div class="topline">
        <div class="badge">⚡ Profile Strength</div>
        <button class="edit">✎ Edit Profile</button>
      </div>
      <div class="main">
        <div>
          <h1>Admissions profile score</h1>
          <p>A quick read on academics, rigor, activities, and story evidence.</p>
          <div class="track"><div class="fill"></div></div>
          <div class="pills">
            <div class="pill"><span class="dot"></span> GPA 3.85</div>
            <div class="pill"><span class="dot blue"></span> SAT 1550</div>
            <div class="pill"><span class="dot pink"></span> 13 APs</div>
          </div>
        </div>
        <div class="score">
          <div class="num">96<span>/99</span></div>
          <div class="rank">Top 5%</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
