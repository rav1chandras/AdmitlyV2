<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Profile Strength Mockup</title>
  <style>
    :root {
      --navy: #06245B;
      --yellow: #FFE500;
      --green: #0F8B63;
      --muted: #667085;
      --line: #dbe7f8;
      --paper: #f5f7fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
    }

    .card {
      width: min(950px, 100%);
      min-height: 330px;
      border: 1px solid #cfe0f8;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      padding: 34px 38px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.94), rgba(247,251,255,.86)),
        url("../public/college-detail-bg.svg") center / cover no-repeat;
      box-shadow: 0 18px 44px rgba(6, 36, 91, .08);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 86% 16%, rgba(255,229,0,.25), transparent 18%),
        linear-gradient(rgba(6,36,91,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,36,91,.03) 1px, transparent 1px);
      background-size: auto, 36px 36px, 36px 36px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 28px;
      min-height: 260px;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 38px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(6,36,91,.12);
      background: rgba(255,255,255,.82);
      color: var(--navy);
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(6,36,91,.05);
    }

    .badge .bolt {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: var(--yellow);
      font-size: 13px;
    }

    .free-chip {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(6,36,91,.07);
      color: rgba(6,36,91,.72);
      font-size: 12px;
      font-weight: 850;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: var(--navy);
      max-width: 620px;
    }

    .sub {
      margin: 12px 0 0;
      max-width: 620px;
      color: #63799c;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 650;
    }

    .progress {
      margin-top: 26px;
      max-width: 630px;
    }

    .track {
      height: 12px;
      border-radius: 999px;
      background: rgba(6,36,91,.09);
      overflow: hidden;
    }

    .fill {
      width: 96%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #cc266d, var(--navy) 52%, #0bb08a);
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .pill {
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 15px;
      border-radius: 999px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(6,36,91,.12);
      color: var(--navy);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(6,36,91,.04);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    .dot.blue { background: var(--navy); }
    .dot.pink { background: #cc266d; }

    .side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
    }

    .edit {
      height: 52px;
      border: 0;
      border-radius: 16px;
      padding: 0 22px;
      background: var(--navy);
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 14px 28px rgba(6,36,91,.18);
    }

    .score {
      text-align: right;
    }

    .score-main {
      font-size: 82px;
      line-height: .86;
      letter-spacing: -.06em;
      font-weight: 950;
    }

    .score-main span {
      color: rgba(6,36,91,.28);
      font-size: 26px;
      letter-spacing: -.02em;
    }

    .rank {
      display: inline-flex;
      margin-top: 16px;
      height: 38px;
      align-items: center;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(15,139,99,.12);
      color: var(--green);
      font-weight: 950;
      font-size: 15px;
    }

    .unlock {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,229,0,.9);
      color: var(--navy);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 850;
      box-shadow: 0 10px 22px rgba(6,36,91,.08);
    }

    .unlock strong {
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
    }
  </style>
</head>
<body>
  <section class="card" aria-label="Profile strength hero mockup">
    <div class="content">
      <div>
        <div class="top">
          <div class="badge"><span class="bolt">↯</span> Profile Strength</div>
          <div class="free-chip">Free preview</div>
        </div>

        <h1>Admissions profile score</h1>
        <p class="sub">A quick read on academics, course rigor, activities, and story evidence.</p>

        <div class="progress">
          <div class="track"><div class="fill"></div></div>
        </div>

        <div class="pills">
          <div class="pill"><span class="dot"></span> GPA 3.85</div>
          <div class="pill"><span class="dot blue"></span> SAT 1550</div>
          <div class="pill"><span class="dot pink"></span> 13 APs</div>
        </div>
      </div>

      <aside class="side">
        <button class="edit">✎ Edit Profile</button>
        <div class="score">
          <div class="score-main">96<span>/99</span></div>
          <div class="rank">Top 5%</div>
        </div>
        <div class="unlock">
          <strong>Next unlocked insight</strong>
          Add 2 more activities to sharpen your college fit map.
        </div>
      </aside>
    </div>
  </section>
</body>
</html>
